<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Radar rings -->
  <circle cx="32" cy="32" r="28" stroke="#3b82f6" stroke-width="1.5" opacity="0.25"/>
  <circle cx="32" cy="32" r="20" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <circle cx="32" cy="32" r="12" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <!-- Crosshairs -->
  <line x1="32" y1="8" x2="32" y2="18" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="46" x2="32" y2="56" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="8" y1="32" x2="18" y2="32" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="46" y1="32" x2="56" y2="32" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <!-- Sweep trail (faded arc) -->
  <path d="M32 32 A20 20 0 0 1 16 20" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" opacity="0.12"/>
  <!-- Sweep line -->
  <line x1="32" y1="32" x2="47" y2="15" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#3b82f6"/>
  <!-- Detected signal glow -->
  <circle cx="47" cy="16" r="11" fill="#3b82f6" opacity="0.06"/>
  <!-- Detected signal pulse -->
  <circle cx="47" cy="16" r="8" stroke="#3b82f6" stroke-width="1.5" opacity="0.25"/>
  <!-- Detected signal dot -->
  <circle cx="47" cy="16" r="4" fill="#3b82f6"/>
  <!-- Upward yield arrow inside signal dot -->
  <path d="M47 19 L47 13 M44.5 15.5 L47 13 L49.5 15.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
